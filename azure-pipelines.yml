trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: HealthCheck
  jobs:
  - job: AzureHealth
    steps:

    - script: |
        echo "===== Azure Health Check Started ====="

        echo ""
        echo "🔹 Checking Pipeline Agent..."
        echo "Agent is running on: $(uname -a)"

        echo ""
        echo "🔹 Checking Date and Time..."
        date

        echo ""
        echo "🔹 Checking Pipeline Variables..."
        echo "Build ID: $(Build.BuildId)"
        echo "Build Number: $(Build.BuildNumber)"
        echo "Branch: $(Build.SourceBranchName)"
        echo "Repo: $(Build.Repository.Name)"

        echo ""
        echo "🔹 Pipeline is Working Successfully!"

        echo ""
        echo "===== Azure Health Check Completed ====="
      displayName: 'Run Pipeline Test'
