trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

stages:
  - stage: Build
    jobs:
      - job: BuildJob
        steps:
          - script: echo "Build step running..."
            displayName: 'Build'

          - script: echo "Build complete!"
            displayName: 'Build done'

  - stage: Test
    dependsOn: Build
    jobs:
      - job: TestJob
        steps:
          - script: echo "Running tests..."
            displayName: 'Test'

          - script: echo "All tests passed!"
            displayName: 'Test done'

  - stage: Deploy
    dependsOn: Test
    jobs:
      - job: DeployJob
        steps:
          - script: echo "Deploying application..."
            displayName: 'Deploy'

          - script: echo "Deployment complete!"
            displayName: 'Deploy done'